<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>居願 — 精品抱枕批發目錄</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
/* 字體規範
   品牌英文標題 : Cormorant Garamond（優雅古典襯線，精品感）
   中文標題、品名 : Noto Serif TC（宋體，沉穩有質感）
   內文 / UI : Noto Sans TC（黑體，清晰易讀）
   字重規範  : 300 細體內文 / 400 正常 / 500 大標題
*/
:root {
  --cream: #faf8f4; --warm-white: #f5f2ec; --sand: #e8e0d4;
  --taupe: #b5a898; --brown: #7a6355; --dark: #2c2420; --accent: #9b8470;
  --img-bg: #ede8e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',sans-serif; font-weight:300; background:var(--cream); color:var(--dark); }
header { background:var(--dark); color:var(--cream); padding:0 48px; height:72px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo-en { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:400; letter-spacing:8px; }
.logo-zh { font-family:'Noto Serif TC',serif; font-size:11px; letter-spacing:4px; color:var(--taupe); margin-top:3px; }
.header-right { font-size:11px; letter-spacing:3px; color:var(--taupe); text-align:right; }
.hero { background:var(--warm-white); padding:64px 48px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--sand); gap:48px; }
.hero h1 { font-family:'Cormorant Garamond',serif; font-size:52px; font-weight:300; line-height:1.15; }
.hero h1 em { font-style:italic; color:var(--accent); }
.hero p { margin-top:16px; font-size:13px; line-height:2; color:var(--brown); max-width:380px; }
.hero-stats { display:flex; gap:1px; background:var(--sand); border:1px solid var(--sand); flex-shrink:0; }
.stat { background:var(--cream); padding:28px 32px; text-align:center; }
.stat-num { display:block; font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:300; }
.stat-label { display:block; font-size:10px; letter-spacing:2px; color:var(--taupe); margin-top:4px; }
.filter-bar { padding:0 48px; display:flex; border-bottom:1px solid var(--sand); overflow-x:auto; }
.filter-btn { background:none; border:none; border-bottom:2px solid transparent; padding:18px 22px; font-family:'Noto Sans TC',sans-serif; font-size:12px; font-weight:300; letter-spacing:2px; color:var(--taupe); cursor:pointer; white-space:nowrap; transition:all .2s; }
.filter-btn:hover { color:var(--dark); }
.filter-btn.active { color:var(--dark); border-bottom-color:var(--dark); }
.catalog { padding:48px 48px 80px; }
.cat-section { margin-bottom:56px; display:none; }
.cat-section.show { display:block; }
.cat-header { display:flex; align-items:center; gap:16px; margin-bottom:28px; }
.cat-title { font-family:'Noto Serif TC',serif; font-size:13px; letter-spacing:4px; color:var(--brown); white-space:nowrap; }
.cat-line { flex:1; height:1px; background:var(--sand); }
.cat-count { font-size:11px; color:var(--taupe); letter-spacing:1px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:2px; background:var(--cream); }
.card { background:var(--cream); cursor:pointer; transition:transform .3s; overflow:hidden; display:flex; flex-direction:column; }
.card:hover { transform:translateY(-4px); z-index:1; }
.card:hover .card-img img { transform:scale(1.05); }
.card-img { aspect-ratio:1/1; overflow:hidden; background:var(--img-bg); display:flex; align-items:center; justify-content:center; padding:16px; }
.card-img img { width:100%; height:100%; object-fit:contain; transition:transform .5s; mix-blend-mode:multiply; filter:contrast(1.02) saturate(1.05); }
.card-body { padding:18px 20px 10px; flex:1; }
.card-id { font-size:10px; letter-spacing:3px; color:var(--taupe); margin-bottom:5px; }
.card-name { font-family:'Noto Serif TC',serif; font-size:15px; font-weight:400; color:var(--dark); margin-bottom:7px; line-height:1.4; }
.card-desc { font-size:11px; color:var(--brown); line-height:1.8; }
.card-footer { padding:10px 20px 18px; display:flex; align-items:center; justify-content:flex-start; gap:6px; flex-wrap:wrap; }
.tag { font-size:10px; letter-spacing:1px; color:var(--accent); padding:3px 8px; border:1px solid var(--sand); }
.lb-overlay { display:none; position:fixed; inset:0; background:rgba(20,16,14,.9); z-index:200; align-items:center; justify-content:center; padding:32px; }
.lb-overlay.open { display:flex; }
.lb-box { background:var(--cream); max-width:820px; width:100%; display:grid; grid-template-columns:1fr 1fr; max-height:88vh; overflow:hidden; animation:fadeUp .3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.lb-img { background:var(--img-bg); overflow:hidden; display:flex; align-items:center; justify-content:center; padding:24px; }
.lb-img img { width:100%; height:100%; object-fit:contain; mix-blend-mode:multiply; filter:contrast(1.02) saturate(1.05); }
.lb-info { padding:40px 36px; display:flex; flex-direction:column; overflow-y:auto; }
#lb-id { font-size:10px; letter-spacing:3px; color:var(--taupe); }
#lb-name { font-family:'Noto Serif TC',serif; font-size:20px; color:var(--dark); margin:10px 0 6px; line-height:1.4; }
#lb-cat { font-size:11px; letter-spacing:2px; color:var(--accent); margin-bottom:20px; }
.lb-divider { width:32px; height:1px; background:var(--sand); margin-bottom:18px; }
.lb-specs { display:grid; grid-template-columns:auto 1fr; gap:8px 16px; margin-bottom:18px; font-size:12px; }
.lb-spec-label { color:var(--taupe); letter-spacing:1px; }
.lb-spec-val { color:var(--dark); font-weight:400; }
#lb-desc { font-size:13px; color:var(--brown); line-height:2; flex:1; }
.lb-close { margin-top:24px; align-self:flex-start; background:var(--dark); color:var(--cream); border:none; padding:10px 22px; font-family:'Noto Sans TC',sans-serif; font-size:11px; letter-spacing:3px; cursor:pointer; transition:background .2s; }
.lb-close:hover { background:var(--brown); }
footer { background:var(--dark); color:var(--taupe); padding:40px 48px; display:flex; justify-content:space-between; align-items:center; }
.footer-brand { font-family:'Cormorant Garamond',serif; font-size:20px; letter-spacing:6px; color:var(--cream); }
.footer-note { font-size:11px; letter-spacing:1px; line-height:1.9; text-align:right; }
@media(max-width:768px){
  header,.filter-bar,.catalog,.hero,footer{padding-left:20px;padding-right:20px;}
  .hero{flex-direction:column;padding-top:40px;padding-bottom:40px;}
  .hero h1{font-size:36px;} .hero-stats{width:100%;}
  .lb-box{grid-template-columns:1fr;} .lb-img{aspect-ratio:4/3;}
  footer{flex-direction:column;gap:16px;} .footer-note{text-align:center;}
}
</style>
</head>
<body>
<header>
  <div><div class="logo-en">居願</div><div class="logo-zh">精品抱枕批發目錄</div></div>
  <div class="header-right">Wholesale Collection<br>2025</div>
</header>
<section class="hero">
  <div>
    <h1>居願<em>抱枕</em><br>批發系列</h1>
    <p>每一個角落，都值得被精心對待</p>
  </div>
  <div class="hero-stats">
    <div class="stat"><span class="stat-num">0</span><span class="stat-label">款式</span></div>
    <div class="stat"><span class="stat-num">0</span><span class="stat-label">系列</span></div>
    <div class="stat"><span class="stat-num">優</span><span class="stat-label">品質</span></div>
  </div>
</section>
<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('all',this)">全部系列</button>
  <button class="filter-btn" onclick="filter('簡約條紋風',this)">簡約條紋風（0）</button>
  <button class="filter-btn" onclick="filter('奢華皮革風',this)">奢華皮革風（0）</button>
  <button class="filter-btn" onclick="filter('拼接撞色風',this)">拼接撞色風（0）</button>
  <button class="filter-btn" onclick="filter('手工工藝風',this)">手工工藝風（0）</button>
  <button class="filter-btn" onclick="filter('毛絨質感風',this)">毛絨質感風（0）</button>
</div>
<main class="catalog">









</main>
<div class="lb-overlay" id="lb" onclick="closeLbOverlay(event)">
  <div class="lb-box">
    <div class="lb-img"><img id="lb-img" src="" alt=""></div>
    <div class="lb-info">
      <div id="lb-id"></div>
      <div id="lb-name"></div>
      <div id="lb-cat"></div>
      <div class="lb-divider"></div>
      <div class="lb-specs">
        <span class="lb-spec-label">尺寸</span><span class="lb-spec-val" id="lb-size"></span>
        <span class="lb-spec-label">庫存</span><span class="lb-spec-val" id="lb-stock"></span>
      </div>
      <div id="lb-desc"></div>
      <button class="lb-close" onclick="closeLb()">關閉 ✕</button>
    </div>
  </div>
</div>
<footer>
  <div class="footer-brand">居願</div>
  <div class="footer-note">如需訂購或查詢，請聯絡業務人員</div>
</footer>
<script>
function filter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cat-section').forEach(s => {
    s.classList.toggle('show', cat === 'all' || s.dataset.cat === cat);
  });
}
function openLb(card) {
  const d = JSON.parse(card.querySelector('.card-data').textContent);
  const img = card.querySelector('.card-img img').src;
  document.getElementById('lb-id').textContent = d.id;
  document.getElementById('lb-name').textContent = d.name;
  document.getElementById('lb-cat').textContent = '系列：' + d.cat;
  document.getElementById('lb-desc').textContent = d.desc;
  document.getElementById('lb-size').textContent = d.size + ' cm';
  document.getElementById('lb-stock').textContent = d.stock + ' 件';
  document.getElementById('lb-img').src = img;
  document.getElementById('lb-img').alt = d.name;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}
function closeLbOverlay(e) { if(e.target===document.getElementById('lb')) closeLb(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLb(); });
</script>
</body>
</html>
